server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API proxy to Hono backend
    # Use a variable + resolver so nginx defers DNS lookup to request time
    # (avoids startup failure when hono_proxy isn't yet resolvable)
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $upstream hono_proxy:3001;
        proxy_pass http://$upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Large data files — moderate caching
    location /data/ {
        expires 1d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Static assets — long-term caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
